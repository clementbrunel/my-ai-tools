name: 🏔️ Surveillance Méribel Mottaret – Juillet

on:
  schedule:
    # Toutes les 6 heures : 0h, 6h, 12h, 18h (UTC = heure française - 2h en été)
    - cron: "0 4,10,16,22 * * *"   # → 6h, 12h, 18h, 0h heure Paris
  workflow_dispatch:                # Déclenchement manuel possible

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Pour committer le cache last_results.json

    steps:
      - name: 📥 Checkout (main – pour récupérer le script)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Nécessaire pour switcher de branche ensuite

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Installer les dépendances
        run: pip install requests beautifulsoup4

      - name: 📂 Restaurer le cache depuis la branche watch
        run: |
          git fetch origin watch 2>/dev/null || true
          # NB : on capture d'abord dans une variable pour ne PAS tronquer le
          # fichier si git show échoue (le redirect > crée un fichier vide
          # AVANT l'exécution de la commande).
          CACHE=$(git show origin/watch:mottaret-watch/last_results.json 2>/dev/null)
          if [ -n "$CACHE" ]; then
            printf '%s' "$CACHE" > mottaret-watch/last_results.json
            echo "✅ Cache restauré depuis origin/watch"
          else
            echo "ℹ️  Pas encore de branche watch ou de cache — première exécution"
          fi

      - name: 🔍 Vérifier les disponibilités
        working-directory: mottaret-watch
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL:   ${{ secrets.NOTIFY_EMAIL }}
        run: python check_availability.py

      - name: 💾 Sauvegarder le cache des résultats sur la branche watch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Sauvegarder le last_results.json produit par le script
          cp mottaret-watch/last_results.json /tmp/last_results.json
          # Supprimer le fichier non-suivi avant le checkout : sinon git refuse
          # de basculer sur 'watch' (qui possède ce fichier en version suivie).
          rm -f mottaret-watch/last_results.json

          # Basculer sur la branche watch :
          #   - Si elle existe sur origin : on repart EXACTEMENT de origin/watch
          #     (git checkout -B = create or reset, évite tout problème de
          #     divergence avec le DWIM classique).
          #   - Sinon : on la crée depuis le HEAD courant (main).
          if git fetch origin watch 2>/dev/null; then
            git checkout -B watch origin/watch
          else
            git checkout -b watch
          fi

          # Restaurer le fichier mis à jour
          mkdir -p mottaret-watch
          cp /tmp/last_results.json mottaret-watch/last_results.json

          # -f au cas où last_results.json serait dans un .gitignore local
          git add -f mottaret-watch/last_results.json
          git diff --cached --quiet || git commit -m "chore: mise à jour cache disponibilités $(date +'%Y-%m-%d %H:%M')"
          # Pas de || true : on veut voir les erreurs de push dans les logs
          git push origin watch
