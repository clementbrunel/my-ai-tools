name: 🏔️ Surveillance Méribel Mottaret – Juillet

on:
  schedule:
    # Toutes les 6 heures : 0h, 6h, 12h, 18h (UTC = heure française - 2h en été)
    - cron: "0 4,10,16,22 * * *"   # → 6h, 12h, 18h, 0h heure Paris
  workflow_dispatch:                # Déclenchement manuel possible

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Pour committer le cache last_results.json

    steps:
      - name: 📥 Checkout (main – pour récupérer le script)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Nécessaire pour switcher de branche ensuite

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Installer les dépendances
        run: pip install requests beautifulsoup4

      - name: 📂 Restaurer le cache depuis la branche watch
        run: |
          git fetch origin watch 2>/dev/null || true
          if git show origin/watch:mottaret-watch/last_results.json \
               > mottaret-watch/last_results.json 2>/dev/null; then
            echo "✅ Cache restauré depuis origin/watch"
          else
            echo "ℹ️  Pas encore de branche watch ou de cache — première exécution"
          fi

      - name: 🔍 Vérifier les disponibilités
        working-directory: mottaret-watch
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL:   ${{ secrets.NOTIFY_EMAIL }}
        run: python check_availability.py

      - name: 💾 Sauvegarder le cache des résultats sur la branche watch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Sauvegarder le last_results.json produit par le script
          cp mottaret-watch/last_results.json /tmp/last_results.json

          # Basculer sur la branche watch (la créer si elle n'existe pas encore)
          git fetch origin watch 2>/dev/null && \
            git checkout watch || \
            git checkout -b watch

          # Restaurer le fichier mis à jour
          mkdir -p mottaret-watch
          cp /tmp/last_results.json mottaret-watch/last_results.json

          git add mottaret-watch/last_results.json
          git diff --cached --quiet || git commit -m "chore: mise à jour cache disponibilités $(date +'%Y-%m-%d %H:%M')"
          git push -u origin watch || true
