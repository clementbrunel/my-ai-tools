spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pronocore}
    username: ${DB_USER:pronocore}
    password: ${DB_PASS:pronocore}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

resend:
  api-key: ${RESEND_API_KEY:}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  cors:
    extra-origin: ${CORS_EXTRA_ORIGIN:}

jwt:
  secret: ${JWT_SECRET:mySecretKey1234567890123456789012345678901234}
  expiration: 86400000

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.pronocore: INFO
    com.pronocore.aspect: INFO
    org.springframework.security: WARN

# jolpica-f1 (Ergast-compatible) — source des calendriers, grilles et résultats F1
f1:
  jolpica:
    base-url: https://api.jolpi.ca/ergast/f1

# api-football.com (v3) — source des scores de football en temps réel
api-football:
  base-url: https://v3.football.api-sports.io
  api-key: ${API_FOOTBALL_KEY:}
  league-id: 1
  season: 2026
