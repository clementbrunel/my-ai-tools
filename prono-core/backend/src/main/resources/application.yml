spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pronocore}
    username: ${DB_USER:pronocore}
    password: ${DB_PASS:pronocore}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    repair-on-migrate: true   # auto-repair checksum mismatches (safe for dev; migrations were edited after apply)

resend:
  api-key: ${RESEND_API_KEY:}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

jwt:
  secret: ${JWT_SECRET:mySecretKey1234567890123456789012345678901234}
  expiration: 86400000

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.pronocore: INFO
    com.pronocore.aspect: INFO
    org.springframework.security: WARN
